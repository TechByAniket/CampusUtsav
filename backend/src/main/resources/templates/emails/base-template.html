<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">CampusUtsav</title>
</head>

<body style="margin:0;padding:20px;background:#f4f4f4;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:8px;padding:30px;">

                <!-- Logo -->
                <tr>
                    <td align="center" style="padding-bottom:20px;">
                        <img th:src="${logoUrl}"
                             alt="CampusUtsav"
                             width="120"
                             style="display:block;"/>
                    </td>
                </tr>

                <!-- Greeting -->
                <tr th:if="${recipientName != null}">
                    <td style="padding-bottom:10px;">
                        Hello <strong th:text="${recipientName}"></strong>,
                    </td>
                </tr>

                <!-- Title -->
                <tr>
                    <td>
                        <h2 style="margin:0 0 20px 0;"
                            th:text="${title}">
                        </h2>
                    </td>
                </tr>

                <!-- Entity Name -->
                <tr th:if="${entityName != null}">
                    <td style="padding-bottom:15px;">
                        <strong th:text="${entityName}"></strong>
                    </td>
                </tr>

                <!-- Message -->
                <tr>
                    <td style="line-height:1.6;">
                        <p th:utext="${message}"></p>
                    </td>
                </tr>

                <!-- Remarks -->
                <tr th:if="${remarks != null}">
                    <td style="padding-top:15px;">
                        <strong>Remarks:</strong>
                        <p th:text="${remarks}"></p>
                    </td>
                </tr>

                <!-- Button -->
                <tr th:if="${buttonText != null and buttonUrl != null}">
                    <td align="center" style="padding-top:25px;">
                        <a th:href="${buttonUrl}"
                           th:text="${buttonText}"
                           style="
                           background:#2563eb;
                           color:white;
                           text-decoration:none;
                           padding:12px 24px;
                           border-radius:6px;
                           display:inline-block;
                           font-weight:bold;">
                        </a>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding-top:30px;">
                        <hr style="border:none;border-top:1px solid #e5e5e5;">

                        <p style="
                           font-size:12px;
                           color:#777777;
                           text-align:center;
                           margin-top:15px;">
                            This is an automated email from CampusUtsav.
                            Please do not reply to this email.
                        </p>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
