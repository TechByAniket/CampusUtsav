<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">CampusUtsav</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:white;margin-top:20px;border-radius:8px;padding:30px;">

                <!-- Logo -->
                <tr>
                    <td align="center">
                        <img
                                src="${logoUrl}"
                                alt="CampusUtsav"
                                width="120">
                    </td>
                </tr>

                <!-- Title -->
                <tr>
                    <td>
                        <h2 th:text="${title}"></h2>
                    </td>
                </tr>

                <!-- Message -->
                <tr>
                    <td>
                        <p th:utext="${message}"></p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td>
                        <hr>
                        <p style="font-size:12px;color:#777;">
                            This is an automated email from CampusUtsav.
                        </p>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
